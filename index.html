                    delay: Math.random() * 8,
                    opacity: 0.4 + Math.random() * 0.4,
                    langIndex: i % loveLanguages.length
                }));
                setActiveHearts(initialHearts);
            }, []);

            const explodeHeart = (id, x, y, langIndex) => {
                setActiveHearts(prev => prev.filter(h => h.id !== id));
                setTaps(t => Math.min(t + 1, TARGET_TAPS));
                setSelectedLang(loveLanguages[langIndex]);

                // Create particles
                const newParticles = Array.from({length: 12}).map((_, i) => ({
                    id: Date.now() + i,
                    x, y,
                    tx: (Math.random() - 0.5) * 200,
                    ty: (Math.random() - 0.5) * 200,
                    color: ['#b80048', '#e40d5d', '#78555e', '#ffd1dc'][Math.floor(Math.random() * 4)]
                }));
                setParticles(prev => [...prev, ...newParticles]);
                setTimeout(() => {
                    setParticles(prev => prev.filter(p => !newParticles.find(np => np.id === p.id)));
                }, 1000);
            };

            return (
                <div class="bg-background text-on-surface font-body-md overflow-hidden min-h-screen flex flex-col">
                    <AppHeader />
                    <main class="flex-grow relative overflow-hidden flex items-center justify-center p-md">
                        <div class="absolute inset-0 glow-radial pointer-events-none animate-[pulse-glow_10s_ease-in-out_infinite]"></div>
                        
                        <div class="absolute inset-0 z-40 pointer-events-none flex items-center justify-center">
                            {selectedLang && (
                                <div key={selectedLang.text} class="language-pop bg-white/90 backdrop-blur-md px-lg py-md rounded-lg shadow-xl border-2 border-secondary text-center pointer-events-auto">
                                    <p class="text-caption text-secondary font-bold mb-xs uppercase tracking-widest">{selectedLang.lang}</p>
                                    <h3 class="font-display text-headline-lg text-on-surface">{selectedLang.text}</h3>
                                </div>
                            )}
                        </div>

                        <div class="absolute inset-0 z-0">
                            {activeHearts.map(h => (
                                <div key={h.id} class="absolute float-animation" style={{left: `${h.x}%`, top: `${h.y}%`, animationDelay: `${h.delay}s`}}>
                                    <button 
                                        onClick={(e) => explodeHeart(h.id, e.clientX, e.clientY, h.langIndex)}
                                        class="material-symbols-outlined text-secondary cursor-pointer hover:scale-125 transition-transform active:scale-150 duration-300 select-none touch-manipulation drop-shadow-sm" 
                                        style={{fontSize: `${h.size}px`, opacity: h.opacity, fontVariationSettings: "'FILL' 1"}}>
                                        favorite
                                    </button>
                                </div>
                            ))}
                            {particles.map(p => (
                                <span key={p.id} class="material-symbols-outlined particle text-[14px]" style={{
                                    color: p.color,
                                    left: p.x,
                                    top: p.y,
                                    animation: 'fade-out-up 1s forwards'
                                }}>sparkles</span>
                            ))}
                        </div>

                        <div class="relative z-10 max-w-container-max w-full flex flex-col items-center text-center space-y-xl pointer-events-none">
                            <div class="space-y-md pointer-events-auto">
                                <h2 class="font-display text-display text-secondary leading-tight shimmer-effect">
                                    I Love You
                                </h2>
                                <div class="relative min-h-[40px]">
                                    {taps < TARGET_TAPS ? (
                                        <div class="inline-flex items-center gap-base px-md py-xs bg-tertiary-container rounded-full shadow-[0px_4px_20px_rgba(227,11,92,0.08)]">
                                            <span class="material-symbols-outlined text-tertiary text-[18px]">touch_app</span>
                                            <span class="font-label-md text-label-md text-tertiary">Tap the hearts ({taps}/{TARGET_TAPS})</span>
                                        </div>
                                    ) : (
                                        <div class="inline-flex items-center justify-center gap-base font-label-md text-label-md text-secondary-container bg-secondary px-md py-xs rounded-full shadow-lg">
                                            Something special awaits... <span class="material-symbols-outlined text-[14px] align-middle">arrow_forward</span>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div class="bg-surface-container-lowest p-base rounded-lg shadow-[0px_4px_20px_rgba(227,11,92,0.08)] border border-outline-variant relative overflow-hidden group max-w-[320px] pointer-events-auto">
                                <img class="w-full h-64 object-cover rounded" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD_HGzuFdtrQSaoz9BwDI7D_-uveP8MEySAQlRsGtDiWe-zcdCofSsHTO-dFMqVYkDgw7GmrmFbrGuwWCR8qRpuFgmQ1AFDKwsjeWGPp7pRJKjeFsMIYaJnrpNVw7CuSro5A0u8W24IAptztpZuxipinr2o_zLxhRptGSQgC0pSkz2qAG7KJM_mZvjhR1l5Im59-Ya9RHljLoAB65RnfYdhjmdq4RUYfJq0XaNWJXlr15pf6ktMI5ych4VpmPVEkxChUUb_FeIbDMPh"/>
                            </div>

                            {taps >= TARGET_TAPS && (
                                <div class="w-full max-w-md bg-white/80 backdrop-blur-sm rounded-lg p-md mt-lg space-y-sm max-h-[300px] overflow-y-auto border-2 border-secondary/20 shadow-xl animate-fade-in pointer-events-auto">
                                    <h3 class="font-headline-md text-secondary mb-md">In every language...</h3>
                                    <div class="grid grid-cols-1 gap-xs text-left">
                                        {loveLanguages.map((item, idx) => (
                                            <div key={idx} class="flex justify-between border-b border-outline-variant/30 py-xs items-baseline">
                                                <span class="text-caption font-bold text-primary mr-md shrink-0">{item.lang}:</span>
                                                <span class="text-body-md text-on-surface font-semibold text-right">{item.text}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                    <BottomNav activeTab="loyalty" />
                </div>
            );
        };

        // --- Main App ---

        const App = () => {
            // Ambient Petal System
            useEffect(() => {
                const interval = setInterval(() => {
                    const petal = document.createElement('div');
                    petal.classList.add('petal');
                    const isHeart = Math.random() > 0.4;
                    
                    // Scattered unevenly by varying speed, size, and rotation more aggressively
                    const sizeVal = Math.random() * 20 + 10;
                    const randomRotation = Math.floor(Math.random() * 360);
                    const opacityVal = 0.4 + Math.random() * 0.5; // Increased visibility

                    if (isHeart) {
                        petal.innerHTML = `<span class="material-symbols-outlined text-secondary" style="font-size: ${sizeVal}px; opacity: ${opacityVal}; font-variation-settings: 'FILL' 1; transform: rotate(${randomRotation}deg)">favorite</span>`;
                    } else {
                        const size = sizeVal / 1.5 + 'px';
                        Object.assign(petal.style, {
                            width: size, height: size,
                            backgroundColor: Math.random() > 0.5 ? '#ffb2bd' : '#e7bbc6',
                            borderRadius: '50% 0 50% 50%',
                            opacity: opacityVal,
                            transform: `rotate(${randomRotation}deg)`
                        });
                    }
                    
                    // Scattered everywhere: randomized starting heights and positions
                    petal.style.left = Math.random() * 100 + 'vw';
                    const startDelay = Math.random() * -10; // Negative delay to start mid-screen
                    
                    // Uneven falling speeds
                    const duration = 3 + Math.random() * 7;
                    petal.style.animation = `float ${duration}s linear infinite`;
                    petal.style.animationDelay = `${startDelay}s`;
                    
                    document.body.appendChild(petal);
                    // Since it's now infinite/scattered, we'll clean up old ones if there's too many
                    const allPetals = document.querySelectorAll('.petal');
                    if (allPetals.length > 100) allPetals[0].remove();
                }, 150); // High frequency for "scattered everywhere" effect
                return () => clearInterval(interval);
            }, []);

            return (
                <MemoryRouter>
                    <Routes>
                        <Route path="/" element={<StartEnvelopeScreen />} />
                        <Route path="/envelope" element={<StartEnvelopeScreen />} />
                        <Route path="/apology" element={<ApologyScreen />} />
                        <Route path="/ask-forgive" element={<AskForgivenessScreen />} />
                        <Route path="/tap-hearts" element={<HeartsFieldScreen />} />
                    </Routes>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
